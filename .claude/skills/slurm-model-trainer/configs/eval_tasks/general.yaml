# General Knowledge Benchmark Suite
# Tests broad knowledge and common sense reasoning

tasks:
  - mmlu
  - hellaswag
  - truthfulqa_mc2
  - winogrande

# Default settings
batch_size: auto
num_fewshot: null
device: cuda
