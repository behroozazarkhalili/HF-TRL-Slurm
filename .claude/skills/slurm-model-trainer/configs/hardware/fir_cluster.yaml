# DRAC Fir Cluster Hardware Configuration

cluster: fir
account: def-maxwl_gpu

# GPU Profiles for H100 MIG instances
gpu_profiles:
  mig_40gb:
    gres: "gpu:nvidia_h100_80gb_hbm3_3g.40gb:1"
    memory: "64G"
    cpus: 8
  mig_10gb:
    gres: "gpu:nvidia_h100_80gb_hbm3_1g.10gb:1"
    memory: "32G"
    cpus: 4

# Partitions
partitions:
  standard: gpubase_bygpu_b3  # Standard partition
  long_running: gpubase_bygpu_b5  # For longer jobs (up to 7 days)

# Time limit recommendations by training method and model size
time_limits:
  sft:
    small: "2-00:00:00"   # 2 days
    medium: "2-00:00:00"  # 2 days
    large: "4-00:00:00"   # 4 days
  grpo:
    small: "4-00:00:00"   # 4 days
    medium: "4-00:00:00"  # 4 days
    large: "6-00:00:00"   # 6 days
  dpo:
    small: "2-00:00:00"   # 2 days
    medium: "3-00:00:00"  # 3 days
    large: "4-00:00:00"   # 4 days

# Environment setup
environment:
  modules:
    - gcc
    - arrow
    - python/3.11.5
  venv_path: /scratch/ermia/venvs/hf_env
  cache_base: /scratch/$USER/.cache/huggingface
